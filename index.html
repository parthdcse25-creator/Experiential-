<!DOCTYPE html>
<html>
<head>
    <title>Science Lab Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: #0f172a;
            color: white;
        }

        .lab-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .lab-header {
            background: #1e293b;
            padding: 15px;
            text-align: center;
        }

        .lab-viewport {
            display: grid;
            grid-template-columns: 220px 1fr 220px;
            flex: 1;
        }

        .tool-shelf, .control-panel {
            background: #1e293b;
            padding: 15px;
        }

        .tool, .chemical {
            background: #334155;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            cursor: grab;
            text-align: center;
        }

        .work-surface {
            background: #020617;
            border: 2px dashed #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .placeholder-text {
            position: absolute;
            color: #64748b;
        }

        #labCanvas {
            width: 100%;
            height: 100%;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            background: #475569;
            color: white;
            cursor: pointer;
        }

        .primary-btn {
            background: #22c55e;
        }

        .data-log {
            display: flex;
            justify-content: space-around;
            background: #1e293b;
            padding: 10px;
        }
    </style>
</head>
<body>
<div class="lab-container">
    <header class="lab-header">
        <h1>Virtual Chemistry Lab</h1>
        <p>Experiment: Acid-Base Titration</p>
    </header>
    <main class="lab-viewport">
        <aside class="tool-shelf">
            <h3>Equipments</h3>
            <div class="tool" draggable="true">Beaker</div>
            <div class="tool" draggable="true">Burner</div>
            <div class="tool" draggable="true">Thermometer</div>
            <h3>Chemicals</h3>
            <div class="chemical" draggable="true" data-ph="1">HCl (Acid)</div>
            <div class="chemical" draggable="true" data-ph="13">NaOH (Base)</div>
        </aside>
        <section class="work-surface" id="drop-zone">
            <div class="placeholder-text">Drag items here</div>
        </section>
        <aside class="control-panel">
            <h3>Controls</h3>
            <label>Heat Intensity</label>
            <input type="range" id="temp-slider" min="0" max="100" value="0">
            <button id="reset-btn">Reset</button>
            <button id="run-btn" class="primary-btn">Start Reaction</button>
        </aside>
   </main>
    <footer class="data-log">
        <div>Temperature: <span id="temp-display">25°C</span></div>
        <div>pH Level: <span id="ph-display">7</span></div>
        <div>Status: <span id="status-text">Idle</span></div>
    </footer>
</div>
<script>
    let draggedItem = null;
    let currentPH = 7;
    document.querySelectorAll('.tool, .chemical').forEach(item => {
        item.addEventListener('dragstart', () => {
            draggedItem = item;
        });
    });
    const dropZone = document.getElementById('drop-zone');
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
    });

    dropZone.addEventListener('drop', () => {
        if (draggedItem) {
            let clone = draggedItem.cloneNode(true);
            clone.style.margin = "5px";
            dropZone.appendChild(clone);
            if (clone.dataset.ph) {
                currentPH = (currentPH + parseInt(clone.dataset.ph)) / 2;
                document.getElementById('ph-display').innerText = currentPH.toFixed(1);
            }
        }
    });
    const slider = document.getElementById('temp-slider');
    slider.addEventListener('input', () => {
        document.getElementById('temp-display').innerText = slider.value + "°C";
    });
    document.getElementById('run-btn').onclick = () => {
        document.getElementById('status-text').innerText = "Reaction Running...";
    };
    document.getElementById('reset-btn').onclick = () => {
        dropZone.innerHTML = '<div class="placeholder-text">Drag items here</div>';
        currentPH = 7;
        document.getElementById('ph-display').innerText = "7";
        document.getElementById('temp-display').innerText = "25°C";
        document.getElementById('status-text').innerText = "Idle";
        slider.value = 0;
    };
</script>
</body>
</html>
